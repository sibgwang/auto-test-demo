name: 自动化测试全流程
on:
  push:
    branches: [ main ]

jobs:
  build-deploy-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 构建并启动被测服务
      - name: 构建&启动服务
        run: |
          docker build -f Dockerfile.app -t test-app .
          docker run -d -p 8080:8080 --name test-app test-app
          sleep 5

      # 2. 运行自动化测试
      - name: 运行自动化测试
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          docker build -f Dockerfile.test -t test-script .
          docker run -e SERVER_IP=${{ secrets.SERVER_IP }} --name test-script test-script
          docker cp test-script:/app/allure-results ./allure-results

      # 3. 上传报告到阿里云
      - name: 上传报告到服务器
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /home/auto_test/report
            rm -rf /home/auto_test/report/allure-results
          scp_source: ./allure-results
          scp_target: /home/auto_test/report/

      # 4. 启动Allure报告服务
      - name: 启动Allure报告
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker stop allure-report || true
            docker rm allure-report || true
            docker run -d \
              -p 8888:8888 \
              -v /home/auto_test/report/allure-results:/allure-results \
              --name allure-report \
              frankescobar/allure-docker-service \
              allure generate /allure-results -o /allure-report --clean && allure serve /allure-report -p 8888 --host 0.0.0.0

      # 5. 发送飞书通知
      - name: 飞书通知
        run: |
          REPORT_URL="http://${{ secrets.SERVER_IP }}:8888"
          curl -X POST ${{ secrets.FEISHU_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "text",
              "content": {
                "text": "✅ 自动化测试流水线执行完成\n🎯 状态：成功\n📊 报告地址：'"${REPORT_URL}"'"
              }
            }'
